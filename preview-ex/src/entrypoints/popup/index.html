<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pinnit</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    :root {
      color-scheme: dark;
      --bg:      #122620;
      --panel:   #1A3028;
      --raised:  #223A30;
      --fold:    rgba(207,194,146,0.12);
      --fold-hi: rgba(207,194,146,0.20);
      --txt1:    #CFC292;
      --txt2:    #B8A87A;
      --txt3:    #8A7D5E;
      --pin:     #CFC292;
      --pin-bg:  rgba(207,194,146,0.10);
      --pin-bd:  rgba(207,194,146,0.25);
      --mark:    #CFC292;
      --mark-bg: rgba(207,194,146,0.10);
      --mark-bd: rgba(207,194,146,0.25);
      --red:     #EF4444;
      --red-bg:  rgba(239,68,68,0.10);
      --red-bd:  rgba(239,68,68,0.22);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      width: 340px;
      min-height: 200px;
      overflow-x: hidden;
      background: var(--bg);
      color: var(--txt1);
    }

    #root { padding: 18px 16px; }

    ::-webkit-scrollbar       { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--fold-hi); border-radius: 2px; }

    input::placeholder { color: var(--txt3); }

    :focus-visible { outline: 2px solid var(--pin); outline-offset: 2px; border-radius: 6px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./main.tsx"></script>
</body>
</html>
